version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - backend_chroma:/app/chroma_db
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
      - backend_models:/app/saved_models
    environment:
      - HF_API_KEY=${HF_API_KEY}
      - HF_MODEL_ID=${HF_MODEL_ID:-mistralai/Mistral-7B-Instruct-v0.3}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      - CHROMA_DB_PATH=/app/chroma_db
      - UPLOAD_FOLDER=/app/uploads
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=sqlite:////app/chroma_db/app.db
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:80}
      - RATE_LIMIT=60/minute
      - MAX_FILE_SIZE=10485760
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_chroma:
  backend_uploads:
  backend_logs:
  backend_models: